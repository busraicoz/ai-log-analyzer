version: "3.9"

services:
  api:
    build: .
    container_name: ai-log-analyzer
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - elasticsearch

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"